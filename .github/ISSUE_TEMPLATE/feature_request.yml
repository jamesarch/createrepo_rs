name: Feature request
description: Suggest an improvement or compatibility enhancement
title: "feature: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What user or packaging workflow problem would this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposed solution
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
    validations:
      required: false
  - type: textarea
    id: compatibility
    attributes:
      label: Compatibility notes
      description: Mention dnf/yum/createrepo_c compatibility implications, if any.
    validations:
      required: false
