name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  CARGO_TERM_COLOR: always

jobs:
  build-and-test:
    name: Build & Test (Ubuntu)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo build --release

      - name: Clippy
        run: cargo clippy -- -D warnings

      - name: Test
        run: cargo test --bin createrepo_rs --release

  linux-static:
    name: Linux Static Binary (x86_64 musl)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.11.0

      - name: Install zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build static binary
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Strip
        run: strip target/x86_64-unknown-linux-musl/release/createrepo_rs

      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: createrepo_rs-x86_64-linux-musl
          path: target/x86_64-unknown-linux-musl/release/createrepo_rs
