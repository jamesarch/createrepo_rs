name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag to release (e.g. v0.1.8)'
        required: true
        type: string

env:
  CARGO_TERM_COLOR: always
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: write
  packages: write

jobs:
  release:
    name: Build and publish ${{ inputs.tag || github.ref_name }}
    runs-on: ubuntu-latest
    env:
      DEBIAN_GPG_PRIVATE_KEY: ${{ secrets.DEBIAN_GPG_PRIVATE_KEY }}
      DEBIAN_GPG_PASSPHRASE: ${{ secrets.DEBIAN_GPG_PASSPHRASE }}
      DEBIAN_GPG_KEY_ID: ${{ secrets.DEBIAN_GPG_KEY_ID }}
    steps:
      - uses: actions/checkout@v4
        with:
          # Manual dispatches use the selected branch contents and publish to
          # inputs.tag. This lets Debian-only packaging revisions (for example
          # 0.1.9-2) be rebuilt without moving the upstream v0.1.9 tag.
          ref: ${{ github.ref }}

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Add musl target
        run: rustup target add x86_64-unknown-linux-musl

      - name: Install zig
        uses: goto-bus-stop/setup-zig@v2
        with:
          version: 0.13.0

      - name: Install zigbuild
        run: cargo install cargo-zigbuild

      - name: Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        run: cargo zigbuild --release --target x86_64-unknown-linux-musl

      - name: Strip & Prepare
        run: |
          strip target/x86_64-unknown-linux-musl/release/createrepo_rs
          cp target/x86_64-unknown-linux-musl/release/createrepo_rs createrepo_rs-x86_64-unknown-linux-musl
          cp target/x86_64-unknown-linux-musl/release/createrepo_rs createrepo_rs

      - name: Determine release version
        run: |
          TAG="${{ inputs.tag || github.ref_name }}"
          VERSION="${TAG#v}"
          MAJOR_MINOR="$(printf '%s' "${VERSION}" | awk -F. '{print $1"."$2}')"
          {
            echo "release_tag=${TAG}"
            echo "release_version=${VERSION}"
            echo "major_minor=${MAJOR_MINOR}"
          } >> "$GITHUB_ENV"

      - name: Build vendored tarball (for COPR)
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          TARBALL="createrepo-rs-${VERSION}-vendored.tar.gz"

          # Vendor all crate dependencies
          cargo vendor

          # Create .cargo/config.toml for offline builds
          mkdir -p .cargo
          cat > .cargo/config.toml << EOFCFG
          [source.crates-io]
          replace-with = "vendored-sources"

          [source.vendored-sources]
          directory = "vendor"
          EOFCFG

          # Create vendored tarball (must extract to createrepo_rs-{VERSION}/ for COPR spec)
          # git ls-files includes all tracked files; add vendor/ and .cargo/ explicitly
          { git ls-files -z; printf '%s\0' vendor .cargo; } | \
            tar --null -T - -czf "${TARBALL}" \
              --transform "s,^,createrepo_rs-${VERSION}/,"

          echo "vendored_tarball=${TARBALL}" >> "$GITHUB_ENV"

      - name: Build Debian source package
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y -qq debhelper devscripts

          VERSION="${release_version}"
          PKG="createrepo-rs"
          SRC_DIR="/tmp/${PKG}-${VERSION}"

          rm -rf "${SRC_DIR}"
          mkdir -p "${SRC_DIR}"
          # Copy all tracked files EXCEPT packaging/ into the Debian-named source dir.
          # Use tar rather than cp --parents so the command is easy to validate outside GNU cp.
          git ls-files -z | grep -zv '^packaging/' | tar --null -T - -cf - | tar -C "${SRC_DIR}" -xf -

          # Copy debian packaging files into the source.
          cp -r packaging/debian "${SRC_DIR}/debian"

          # Create .orig.tar.gz (source without debian/).
          cd /tmp
          tar czf "${PKG}_${VERSION}.orig.tar.gz" --exclude=debian "${PKG}-${VERSION}/"

          # Build the unsigned source upload set first. A later optional debsign step
          # signs both .dsc and .changes for mentors.debian.net.
          cd "${SRC_DIR}"
          dpkg-buildpackage -S -sa -us -uc -d

          cd /tmp
          DEB_VERSION="$(dpkg-parsechangelog --file "${SRC_DIR}/debian/changelog" -S Version)"
          DSC_FILE="${PKG}_${DEB_VERSION}.dsc"
          ORIG_FILE="${PKG}_${VERSION}.orig.tar.gz"
          DEBIAN_FILE="${PKG}_${DEB_VERSION}.debian.tar.xz"
          CHANGES_FILE="${PKG}_${DEB_VERSION}_source.changes"
          BUILDINFO_FILE="${PKG}_${DEB_VERSION}_source.buildinfo"

          ls -la "${DSC_FILE}" "${ORIG_FILE}" "${DEBIAN_FILE}" "${CHANGES_FILE}" "${BUILDINFO_FILE}"
          cp "${DSC_FILE}" "${ORIG_FILE}" "${DEBIAN_FILE}" "${CHANGES_FILE}" "${BUILDINFO_FILE}" "${GITHUB_WORKSPACE}/"

          {
            echo "dsc_file=${DSC_FILE}"
            echo "orig_file=${ORIG_FILE}"
            echo "debian_tar_file=${DEBIAN_FILE}"
            echo "changes_file=${CHANGES_FILE}"
            echo "buildinfo_file=${BUILDINFO_FILE}"
          } >> "$GITHUB_ENV"

      - name: Sign Debian source package
        if: ${{ env.DEBIAN_GPG_PRIVATE_KEY != '' }}
        run: |
          GNUPGHOME="$(mktemp -d)"
          export GNUPGHOME
          chmod 700 "$GNUPGHOME"
          printf '%s' "$DEBIAN_GPG_PRIVATE_KEY" | gpg --batch --import

          KEY_ARG="${DEBIAN_GPG_KEY_ID}"
          if [ -z "${KEY_ARG}" ]; then
            KEY_ARG="$(gpg --batch --with-colons --list-secret-keys | awk -F: '/^sec:/ { print $5; exit }')"
          fi

          if [ -n "${DEBIAN_GPG_PASSPHRASE}" ]; then
            cat > gpg-loopback <<'EOFGPG'
          #!/bin/sh
          exec gpg --batch --yes --pinentry-mode loopback --passphrase "$DEBIAN_GPG_PASSPHRASE" "$@"
          EOFGPG
            chmod 700 gpg-loopback
            export DEBSIGN_PROGRAM="$PWD/gpg-loopback"
          fi

          debsign -k"${KEY_ARG}" "${changes_file}"

          # Prove both files are signed; mentors rejects unsigned .dsc files even
          # when .changes is signed.
          grep -q '^-----BEGIN PGP SIGNED MESSAGE-----' "${dsc_file}"
          grep -q '^-----BEGIN PGP SIGNED MESSAGE-----' "${changes_file}"

      - name: Build .deb package
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          DEB_NAME="createrepo-rs_${VERSION}_amd64"
          DEB_ROOT="/tmp/${DEB_NAME}"

          mkdir -p "${DEB_ROOT}/usr/bin"
          mkdir -p "${DEB_ROOT}/usr/share/doc/createrepo-rs"
          mkdir -p "${DEB_ROOT}/usr/share/licenses/createrepo-rs"
          mkdir -p "${DEB_ROOT}/DEBIAN"

          cp createrepo_rs-x86_64-unknown-linux-musl "${DEB_ROOT}/usr/bin/createrepo_rs"
          cp README.md README_zh.md "${DEB_ROOT}/usr/share/doc/createrepo-rs/"
          cp LICENSE "${DEB_ROOT}/usr/share/licenses/createrepo-rs/"

          cat > "${DEB_ROOT}/DEBIAN/control" << EOFCTRL
          Package: createrepo-rs
          Version: ${VERSION}
          Section: admin
          Priority: optional
          Architecture: amd64
          Maintainer: jamesarch <han.shan@live.cn>
          Homepage: https://github.com/artifactx-rs/createrepo_rs
          Description: Pure Rust RPM repository metadata generator
           createrepo-rs is a pure Rust implementation of createrepo_c that generates
           RPM repository metadata (repodata). It produces dnf/yum-compatible output
           as a drop-in replacement for createrepo_c, with zero FFI dependencies and
           a single static binary.
           .
           Features:
            - primary.xml, filelists.xml, other.xml, repomd.xml generation
            - In-memory SQLite with atomic VACUUM INTO disk flush
            - Parallel RPM parsing (auto-detects CPU count)
            - --dump-manifest for package inventory + signature detection
            - --timeout watchdog for stuck I/O (network mounts)
            - Incremental mode with --update
            - Compression: gzip, zstd, xz, bzip2
          EOFCTRL

          dpkg-deb --root-owner-group --build "${DEB_ROOT}" "${DEB_NAME}.deb"
          echo "deb_file=${DEB_NAME}.deb" >> "$GITHUB_ENV"

      - name: Build .rpm package
        run: |
          VERSION="${{ inputs.tag || github.ref_name }}"
          VERSION="${VERSION#v}"
          RPM_NAME="createrepo-rs-${VERSION}-1"

          RPM_ROOT="/tmp/rpmbuild"
          rm -rf "${RPM_ROOT}"
          mkdir -p "${RPM_ROOT}"/{BUILD,RPMS,SOURCES,SPECS,SRPMS}

          cp createrepo_rs-x86_64-unknown-linux-musl "${RPM_ROOT}/SOURCES/createrepo_rs"
          cp README.md README_zh.md LICENSE "${RPM_ROOT}/SOURCES/"

          cat > "${RPM_ROOT}/SPECS/createrepo-rs.spec" << EOFSPEC
          Name:           createrepo-rs
          Version:        ${VERSION}
          Release:        1
          Summary:        Pure Rust RPM repository metadata generator
          License:        GPL-2.0-or-later
          URL:            https://github.com/artifactx-rs/createrepo_rs

          %description
          createrepo-rs is a pure Rust implementation of createrepo_c that generates
          RPM repository metadata (repodata). It produces dnf/yum-compatible output
          as a drop-in replacement for createrepo_c, with zero FFI dependencies and
          a single static binary.

          %install
          install -D -m 0755 %{_sourcedir}/createrepo_rs %{buildroot}/usr/bin/createrepo_rs
          install -D -m 0644 %{_sourcedir}/README.md %{buildroot}/usr/share/doc/createrepo-rs/README.md
          install -D -m 0644 %{_sourcedir}/README_zh.md %{buildroot}/usr/share/doc/createrepo-rs/README_zh.md
          install -D -m 0644 %{_sourcedir}/LICENSE %{buildroot}/usr/share/licenses/createrepo-rs/LICENSE

          %files
          /usr/bin/createrepo_rs
          %dir /usr/share/doc/createrepo-rs/
          %doc /usr/share/doc/createrepo-rs/README.md
          %doc /usr/share/doc/createrepo-rs/README_zh.md
          %dir /usr/share/licenses/createrepo-rs/
          %license /usr/share/licenses/createrepo-rs/LICENSE

          %changelog
          EOFSPEC

          # Install rpm-build (already present on ubuntu-latest)
          sudo apt-get install -y -qq rpm 2>&1 | tail -1
          rpmbuild -bb --define "_topdir ${RPM_ROOT}" "${RPM_ROOT}/SPECS/createrepo-rs.spec"

          RPM_FILE="${RPM_ROOT}/RPMS/x86_64/${RPM_NAME}.x86_64.rpm"
          cp "${RPM_FILE}" .
          echo "rpm_file=$(basename "${RPM_FILE}")" >> "$GITHUB_ENV"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to Docker Hub
        continue-on-error: true
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata (GHCR)
        id: meta-ghcr
        uses: docker/metadata-action@v5
        with:
          images: ghcr.io/${{ github.repository_owner }}/createrepo-rs
          tags: |
            type=raw,value=${{ env.release_version }}
            type=raw,value=${{ env.major_minor }}
            type=raw,value=latest
            type=sha

      - name: Docker metadata (Docker Hub)
        id: meta-dockerhub
        uses: docker/metadata-action@v5
        with:
          images: jamesarch/createrepo-rs
          tags: |
            type=raw,value=${{ env.release_version }}
            type=raw,value=${{ env.major_minor }}
            type=raw,value=latest
            type=sha

      - name: Prepare Dockerfile
        run: |
          cat > Dockerfile.build << 'DOCKEREOF'
          FROM scratch
          COPY createrepo_rs /usr/local/bin/createrepo_rs
          ENTRYPOINT ["/usr/local/bin/createrepo_rs"]
          DOCKEREOF

      - name: Build and push GHCR image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-ghcr.outputs.tags }}
          labels: ${{ steps.meta-ghcr.outputs.labels }}
          platforms: linux/amd64
          file: Dockerfile.build

      - name: Build and push Docker Hub image
        continue-on-error: true
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta-dockerhub.outputs.tags }}
          labels: ${{ steps.meta-dockerhub.outputs.labels }}
          platforms: linux/amd64
          file: Dockerfile.build

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ inputs.tag || github.ref_name }}
          name: ${{ inputs.tag || github.ref_name }}
          draft: false
          prerelease: false
          body: |
            ## Changes in ${{ inputs.tag || github.ref_name }}

            See [commits](https://github.com/artifactx-rs/createrepo_rs/compare/${{ inputs.tag || github.ref_name }}...main) for full history.
          files: |
            createrepo_rs-x86_64-unknown-linux-musl
            ${{ env.deb_file }}
            ${{ env.rpm_file }}
            ${{ env.vendored_tarball }}
            ${{ env.dsc_file }}
            ${{ env.orig_file }}
            ${{ env.debian_tar_file }}
            ${{ env.changes_file }}
            ${{ env.buildinfo_file }}
