server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    location / {
        autoindex on;
        autoindex_exact_size off;
    }

    # 不需要缓存元数据文件
    location /repodata/ {
        autoindex on;
        add_header Cache-Control "no-cache";
    }
}
